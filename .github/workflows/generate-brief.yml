# Generates the daily brief via the Claude API, commits it to briefs/,
# pushes to main, and emails it via Resend.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY  Claude API key (https://console.anthropic.com/)
#   RESEND_API_KEY     Resend API key (https://resend.com/api-keys)
#
# Optional repository secret:
#   MAIL_FROM          Verified sender on a Resend domain. Defaults to
#                      onboarding@resend.dev (only delivers to the email
#                      that owns the Resend account).

name: Generate & Email Daily Brief

on:
  schedule:
    # 11:00 UTC weekdays = 07:00 ET (EDT, summer) / 06:00 ET (EST, winter).
    # GitHub Actions cron is UTC-only and may be delayed by 5-15 minutes
    # under platform load.
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet anthropic markdown

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_brief.py

      - name: Resolve brief path
        id: brief
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          FILE="briefs/${DATE}-brief.md"
          if [ ! -f "$FILE" ]; then
            echo "Brief file $FILE was not produced." >&2
            exit 1
          fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.brief.outputs.file }}"
          if git diff --cached --quiet; then
            echo "Brief unchanged; skipping commit."
          else
            git commit -m "Add daily market brief for ${{ steps.brief.outputs.date }}"
            git push origin main
          fi

      - name: Render Markdown to HTML
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import markdown, pathlib
          src = pathlib.Path("${{ steps.brief.outputs.file }}").read_text()
          html = markdown.markdown(src, extensions=["tables", "fenced_code"])
          pathlib.Path("body.html").write_text(html)
          PY

      - name: Send via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          set -euo pipefail
          FROM="${MAIL_FROM:-onboarding@resend.dev}"
          PAYLOAD=$(jq -n \
            --arg from "Daily Market Brief <$FROM>" \
            --arg to "shgoetze@gmail.com" \
            --arg subject "Daily Market Brief" \
            --rawfile html body.html \
            '{from: $from, to: [$to], subject: $subject, html: $html}')
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
